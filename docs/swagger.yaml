        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security: [{ BearerAuth: [] }]
      summary: Net worth trend
      tags: [analytics]
  /api/v1/categories:
    get:
      description: List categories for authenticated user.
      produces: [application/json]
      responses:
        "200":
          description: OK
          schema:
            type: array
