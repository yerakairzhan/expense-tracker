      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_handler.AnalyticsCategoryExpense'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Last month expense categories
      tags:
      - analytics
  /api/v1/analytics/monthly-profit:
    get:
      description: Month-by-month income/expense/profit trend for frontend charts.
      parameters:
      - default: 6
        description: Number of months, default 6, max 24
        in: query
        name: months
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_handler.AnalyticsMonthlyProfitPoint'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Monthly profit trend
      tags:
      - analytics
  /api/v1/analytics/summary:
    get:
      description: Income, expense and profit for a custom date range.
      parameters:
        - description: Start date YYYY-MM-DD
          in: query
          name: from
          type: string
        - description: End date YYYY-MM-DD
          in: query
          name: to
          type: string
      produces: [application/json]
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_handler.AnalyticsSummary'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security: [{ BearerAuth: [] }]
      summary: Summary by date range
      tags: [analytics]
  /api/v1/analytics/by-category:
    get:
      description: Category breakdown for a date range.
      parameters:
        - description: Start date YYYY-MM-DD
          in: query
          name: from
          type: string
        - description: End date YYYY-MM-DD
          in: query
          name: to
          type: string
        - description: income|expense
          in: query
          name: type
          type: string
      produces: [application/json]
      responses:
        "200":
          description: OK
          schema:
            type: array
            items:
              $ref: '#/definitions/pkg_handler.AnalyticsCategoryExpense'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security: [{ BearerAuth: [] }]
      summary: Analytics by category
      tags: [analytics]
  /api/v1/analytics/cashflow:
    get:
      description: Cashflow series for a date range.
      parameters:
        - description: Start date YYYY-MM-DD
          in: query
          name: from
          type: string
        - description: End date YYYY-MM-DD
          in: query
          name: to
          type: string
      produces: [application/json]
      responses:
        "200":
          description: OK
          schema:
            type: array
            items:
              type: object
              properties:
                period: { type: string }
                income: { type: string }
                expense: { type: string }
                net: { type: string }
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security: [{ BearerAuth: [] }]
      summary: Cashflow series
      tags: [analytics]
  /api/v1/analytics/net-worth:
    get:
      description: Net worth trend for a date range.
      parameters:
        - description: Start date YYYY-MM-DD
          in: query
          name: from
          type: string
        - description: End date YYYY-MM-DD
          in: query
          name: to
          type: string
      produces: [application/json]
      responses:
        "200":
          description: OK
          schema:
            type: array
            items:
              type: object
              properties:
