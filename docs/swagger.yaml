basePath: /
definitions:
  pkg_handler.Account:
    properties:
      account_type:
        type: string
      balance:
        description: Using string for decimal
        type: string
      created_at:
        type: string
      currency:
        type: string
      id:
        type: integer
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  pkg_handler.BalanceResponse:
    properties:
      balance:
        type: string
    type: object
  pkg_handler.CreateAccountRequest:
    properties:
      account_type:
        type: string
      balance:
        type: string
      currency:
        type: string
      user_id:
        type: integer
    required:
    - account_type
    - balance
    - currency
    - user_id
    type: object
  pkg_handler.CreateTransactionRequest:
    properties:
      account_id:
        type: integer
      amount:
        type: string
      description:
        type: string
      type:
        type: string
    required:
    - account_id
    - amount
    - type
    type: object
  pkg_handler.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  pkg_handler.MessageResponse:
    properties:
      message:
        type: string
    type: object
  pkg_handler.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
    required:
    - email
    - name
    type: object
  pkg_handler.Transaction:
    properties:
      account_id:
        type: integer
      amount:
        description: Using string for decimal
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      transaction_type:
        type: string
    type: object
  pkg_handler.UpdateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
    type: object
  pkg_handler.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for managing users, accounts, and transactions
  title: Finance Tracker API
  version: "1.0"
paths:
  /accounts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_handler.Account'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: List accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Create a new financial account
      parameters:
      - description: Create account payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/pkg_handler.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/pkg_handler.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Create account
      tags:
      - accounts
  /accounts/{id}:
    delete:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_handler.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Delete account
      tags:
      - accounts
    get:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_handler.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Get account by ID
      tags:
      - accounts
  /accounts/{id}/balance:
    get:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_handler.BalanceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Get account balance
      tags:
      - accounts
  /accounts/{id}/transactions:
    get:
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_handler.Transaction'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: List transactions for an account
      tags:
      - transactions
  /register:
    post:
      consumes:
      - application/json
      description: Create a new user
      parameters:
      - description: Register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/pkg_handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/pkg_handler.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Register user
      tags:
      - users
  /transactions:
    get:
      description: List transactions; optionally filter by account_id
      parameters:
      - description: Account ID filter
        in: query
        name: account_id
        type: integer
      - description: Limit (default 50)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_handler.Transaction'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: List transactions
      tags:
      - transactions
    post:
      consumes:
      - application/json
      description: Create a new transaction for an account
      parameters:
      - description: Create transaction payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/pkg_handler.CreateTransactionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/pkg_handler.Transaction'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Create transaction
      tags:
      - transactions
  /transactions/{id}:
    delete:
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_handler.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Delete transaction
      tags:
      - transactions
    get:
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_handler.Transaction'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Get transaction by ID
      tags:
      - transactions
  /transactions/export:
    get:
      description: Download transactions as JSON (Content-Disposition attachment)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          headers:
            Content-Disposition:
              description: attachment; filename=transactions.json
              type: string
          schema:
            items:
              $ref: '#/definitions/pkg_handler.Transaction'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Export transactions
      tags:
      - transactions
  /transactions/search:
    get:
      parameters:
      - description: Search keyword
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_handler.Transaction'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Search transactions
      tags:
      - transactions
  /users:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_handler.User'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: List users
      tags:
      - users
  /users/{id}:
    delete:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Delete user
      tags:
      - users
    get:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_handler.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/pkg_handler.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_handler.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: Update user
      tags:
      - users
  /users/{id}/accounts:
    get:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_handler.Account'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorResponse'
      summary: List accounts for a user
      tags:
      - accounts
swagger: "2.0"
