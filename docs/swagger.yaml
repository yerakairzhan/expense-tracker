basePath: /
definitions:
  pkg_handler.AccessTokenResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
    type: object
  pkg_handler.Account:
    properties:
      account_type:
        type: string
      balance:
        type: string
      created_at:
        type: string
      currency:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  pkg_handler.AnalyticsCategoryExpense:
    properties:
      amount:
        type: string
      category:
        type: string
    type: object
  pkg_handler.AnalyticsDailyPoint:
    properties:
      date:
        type: string
      expense:
        type: string
      income:
        type: string
      profit:
        type: string
    type: object
  pkg_handler.AnalyticsMonthlyProfitPoint:
    properties:
      expense:
        type: string
      income:
        type: string
      month:
        type: string
      profit:
        type: string
    type: object
  pkg_handler.AnalyticsSummary:
    properties:
      expense:
        type: string
      income:
        type: string
      period_end:
        type: string
      period_start:
        type: string
      profit:
        type: string
    type: object
  pkg_handler.ChangePasswordRequest:
    properties:
      current_password:
        maxLength: 128
        minLength: 8
        type: string
      new_password:
        maxLength: 128
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  pkg_handler.CreateAccountRequest:
    properties:
      account_type:
        enum:
        - cash
        - bank_card
        - e_wallet
        type: string
      balance:
        type: string
      currency:
        type: string
      name:
        maxLength: 120
        minLength: 1
        type: string
    required:
    - account_type
    - currency
    - name
    type: object
  pkg_handler.CreateTransactionRequest:
    properties:
      account_id:
        minimum: 1
        type: integer
      amount:
        type: string
      category_id:
        minimum: 1
        type: integer
      currency:
        type: string
      description:
        maxLength: 255
        minLength: 1
        type: string
      notes:
        maxLength: 1000
        type: string
      transacted_at:
        type: string
      type:
        enum:
        - income
        - expense
        - transfer
        type: string
    required:
    - account_id
    - amount
    - currency
    - description
    - transacted_at
    - type
    type: object
  pkg_handler.ErrorBody:
    properties:
      code:
        example: VALIDATION_ERROR
        type: string
      message:
        example: invalid account id
        type: string
    type: object
  pkg_handler.ErrorEnvelope:
    properties:
      error:
        $ref: '#/definitions/pkg_handler.ErrorBody'
    type: object
  pkg_handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  pkg_handler.RegisterRequest:
    properties:
      currency:
        type: string
      email:
        type: string
      name:
        maxLength: 120
        minLength: 1
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
    required:
    - currency
    - email
    - name
    - password
    type: object
  pkg_handler.StatusResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  pkg_handler.Transaction:
    properties:
      account_id:
        type: integer
      amount:
        type: string
      category_id:
        type: integer
      created_at:
        type: string
      currency:
        type: string
      description:
        type: string
      id:
        type: integer
      notes:
        type: string
      transacted_at:
        type: string
      type:
        type: string
      updated_at:
        type: string
    type: object
  pkg_handler.UpdateAccountRequest:
    properties:
      account_type:
        enum:
        - cash
        - bank_card
        - e_wallet
        type: string
      currency:
        type: string
      name:
        maxLength: 120
        minLength: 1
        type: string
    type: object
  pkg_handler.UpdateMeRequest:
    properties:
      currency:
        type: string
      name:
        maxLength: 120
        minLength: 1
        type: string
    type: object
  pkg_handler.UpdateTransactionRequest:
    properties:
      amount:
        type: string
      category_id:
        minimum: 1
        type: integer
      notes:
        maxLength: 1000
        type: string
    type: object
  pkg_handler.User:
    properties:
      created_at:
        type: string
      currency:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
info:
  contact: {}
  description: Personal finance tracking API (v1 core).
  title: Finance Tracker API
  version: "1.0"
paths:
  /api/v1/accounts:
    get:
      description: List all accounts for authenticated user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_handler.Account'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: List accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Create an account for authenticated user.
      parameters:
      - description: Create account payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/pkg_handler.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/pkg_handler.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Create account
      tags:
      - accounts
  /api/v1/accounts/{id}:
    delete:
      description: Soft-delete account for authenticated user.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Delete account
      tags:
      - accounts
    get:
      description: Get account by id for authenticated user.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_handler.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Get account
      tags:
      - accounts
    patch:
      consumes:
      - application/json
      description: Update account fields for authenticated user.
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update account payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/pkg_handler.UpdateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg_handler.Account'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Update account
      tags:
      - accounts
  /api/v1/analytics/daily-profit:
    get:
      description: 'Daily income/expense/profit for range (default: previous month).'
      parameters:
      - description: Start date YYYY-MM-DD
        in: query
        name: from
        type: string
      - description: End date YYYY-MM-DD
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg_handler.AnalyticsDailyPoint'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Daily profit series
      tags:
      - analytics
  /api/v1/analytics/expense-categories/last-month:
    get:
      description: Expense distribution by category for the previous calendar month.
      produces:
