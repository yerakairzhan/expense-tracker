        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
      security: [{ BearerAuth: [] }]
      summary: List categories
      tags: [categories]
    post:
      consumes: [application/json]
      description: Create category for authenticated user.
      parameters:
        - description: Create category payload
          in: body
          name: request
          required: true
          schema:
            type: object
            required: [name, type]
            properties:
              name: { type: string }
              type:
                type: string
                enum: [income, expense]
      produces: [application/json]
      responses:
        "201":
          description: Created
          schema: { type: object }
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/pkg_handler.ErrorEnvelope'
        "401":
          description: Unauthorized
