services:
  postgres:
    image: postgres:15-alpine
    container_name: finance-tracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_tracker
    ports:
      - "5435:5432"
    volumes:
      - ./db/migrations:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financial-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance-tracker-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Inside docker-compose network, connect to Postgres via service name "postgres"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/finance_tracker?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - financial-network

networks:
  financial-network:
    driver: bridge

volumes:
  postgres_data:
