services:
  postgres:
    image: postgres:15-alpine
    container_name: financial-intelligence-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financial_intelligence
    ports:
      - "5432:5432"
    volumes:
      - ./db/migrations:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financial-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-intelligence-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: financial_intelligence
      PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - financial-network

networks:
  financial-network:
    driver: bridge

volumes:
  postgres_data:
